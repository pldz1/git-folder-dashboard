<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Git Manager</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon">⌁</span>
        <span class="brand-strong">GIT</span>
        <span class="brand-light">FOLDER MANAGER</span>
      </div>
      <div class="topbar-actions">
        <button id="themeButton" class="icon-button" type="button" aria-label="切换夜间模式">☾</button>
        <div class="topbar-status" aria-label="扫描统计">
          <span class="run-dot"></span>
          <span><strong id="repoCount">0</strong> REPOS · <strong id="nonGitCount">0</strong> DIRS</span>
        </div>
      </div>
    </header>

    <nav class="tabs" aria-label="主导航">
      <button class="tab active" type="button" data-tab="dashboard">DASHBOARD</button>
      <button class="tab" type="button" data-tab="repositories">REPOSITORIES</button>
      <button class="tab" type="button" data-tab="branches">BRANCHES</button>
      <button class="tab" type="button" data-tab="sync">SYNC STATUS</button>
      <button class="tab" type="button" data-tab="local">LOCAL DIRS</button>
    </nav>

    <main class="app-shell">
      <section class="scan-panel" data-panel="dashboard repositories branches sync local">
        <div class="section-title">
          <div>
            <h2>WORKSPACE SCAN</h2>
            <p>扫描该目录下的一级子文件夹，读取 Git 状态和分支信息。</p>
          </div>
        </div>
        <div class="scan-row">
          <label class="path-field" for="pathInput">
            <span>PARENT FOLDER</span>
            <input id="pathInput" type="text" placeholder="D:\workspace" autocomplete="off">
          </label>
          <button id="selectButton" class="secondary" type="button">选择</button>
          <button id="scanButton" class="primary" type="button">扫描</button>
        </div>
        <div id="errorBox" class="error-box" hidden></div>
      </section>

      <section class="summary-grid" data-panel="dashboard repositories branches sync">
        <div class="summary-tile">
          <span class="summary-label">CLEAN</span>
          <strong id="cleanCount">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">CHANGED</span>
          <strong id="changedCount">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">AHEAD</span>
          <strong id="aheadCount">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">BEHIND</span>
          <strong id="behindCount">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">NO REMOTE</span>
          <strong id="noRemoteCount">0</strong>
        </div>
      </section>

      <section class="content-stack">
        <div class="panel repo-panel" data-panel="dashboard repositories branches sync">
          <div class="panel-header">
            <div>
              <h2 id="repoPanelTitle">REPOSITORY STATUS</h2>
              <p id="repoPanelDescription">当前分支、全部分支、同步差异和工作区状态。</p>
            </div>
          </div>
          <div id="repoList" class="repo-list empty">尚未扫描</div>
        </div>

        <div class="panel" data-panel="dashboard local">
          <div class="panel-header">
            <div>
              <h2>NON GIT DIRS</h2>
              <p>扫描到但未识别为仓库。</p>
            </div>
          </div>
          <div id="nonGitList" class="non-git-list empty">尚未扫描</div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
