<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Git Folder Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="rail" aria-label="应用导航">
        <button
          class="rail-button nav-home active"
          type="button"
          data-tab="dashboard"
          aria-label="总览"
          title="总览"
          data-tip="总览"
        ></button>
        <button
          class="rail-button nav-multi"
          type="button"
          data-tab="repositories"
          aria-label="仓库"
          title="仓库"
          data-tip="仓库"
        ></button>
        <button
          class="rail-button nav-frok"
          type="button"
          data-tab="branches"
          aria-label="分支"
          title="分支"
          data-tip="分支"
        ></button>
        <button
          class="rail-button nav-sync"
          type="button"
          data-tab="sync"
          aria-label="同步"
          title="同步"
          data-tip="同步"
        ></button>
        <button
          class="rail-button nav-db"
          type="button"
          data-tab="local"
          aria-label="本地目录"
          title="本地目录"
          data-tip="本地目录"
        ></button>
        <button
          id="themeButton"
          class="rail-button rail-bottom theme-toggle"
          type="button"
          aria-label="切到夜里"
          title="切换主题"
          data-tip="切换主题"
        ></button>
      </aside>

      <aside class="sidebar">
        <section class="workspace-card">
          <div class="sidebar-title">工作区</div>
          <div class="workspace-path-row">
            <span class="folder-icon"></span>
            <input
              id="pathInput"
              type="text"
              placeholder="比如 ~/Code"
              autocomplete="off"
            />
          </div>
          <div class="scan-actions">
            <button id="selectButton" class="secondary" type="button">
              选择
            </button>
            <button id="scanButton" class="primary" type="button">扫描</button>
          </div>
          <div id="errorBox" class="error-box" hidden></div>
        </section>

        <div class="filter-wrap">
          <span class="search-icon"></span>
          <input
            id="filterInput"
            type="search"
            placeholder="筛选仓库"
            autocomplete="off"
          />
        </div>

        <div class="repo-section-label">仓库</div>
        <div id="sidebarRepoList" class="sidebar-repo-list empty">尚未扫描</div>

        <button id="addRepositoryButton" class="add-repo" type="button">
          添加仓库
        </button>
      </aside>

      <main class="detail">
        <section
          id="repoDetail"
          class="detail-stack"
          data-panel="dashboard repositories branches sync"
        ></section>

        <section class="panel" data-panel="local">
          <div class="panel-header">
            <h2>非 Git 目录</h2>
            <p>扫完以后，这里会放那些还没初始化成 Git 仓库的目录。</p>
          </div>
          <div id="nonGitList" class="non-git-list empty">尚未扫描</div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
